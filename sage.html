<!DOCTYPE html>

<title>賢者攻略 - 哈帕迪攻略</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft JhengHei", sans-serif;
    background-color: #111;
    color: #fff;
    padding: 20px 10%;
}

/* Header */
header {
    text-align: center;
    margin-bottom: 40px;
}
header img {
    width: 100%;
    max-height: 60vh;
    object-fit: cover;
    border-radius: 10px;
}
header h1 {
    margin-top: 20px;
}

/* 技能區 */
.skills-links a {
    color: #4af;
    text-decoration: underline;
}

/* FAQ 區 */
details {
    background-color: #222;
    padding: 12px 15px;
    margin-bottom: 12px;
    border-radius: 6px;
}
details summary {
    cursor: pointer;
    font-weight: bold;
}

/* FAQ 圖片縮小 */
.faq img {
    width: 65%;
    max-width: 420px;
    display: block;
    margin: 12px auto;
    border-radius: 6px;
}

/* 技能搭配區 */
select {
    padding: 10px 12px;    /* 增加內距 */
    font-size: 18px;       /* 字體放大 */
    background-color: #222;
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    width: 250px;           /* 寬度加大 */
}

/* combo-content */
.combo-content {
    display: none;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
}
.combo-content.active {
    display: block;
    opacity: 1;
}

/* 技能搭配圖片縮小 */
.combo-content img {
    width: 70%;
    max-width: 500px;
    height: auto;
    display: block;
    margin: 12px auto;
    border-radius: 8px;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 40px;
    color: #888;
}

/* 手機螢幕優化 */
@media (max-width: 768px) {
    body {
        padding: 10px 5%;
    }

    header img {
        max-height: 30vh;
    }

    .faq img, .combo-content img {
        width: 100%;
        max-width: 100%;
    }

    select {
        width: 100%;
        font-size: 18px;   /* 手機字體稍小但仍大 */
    }
}

h2 {
    margin-top: 40px;
    margin-bottom: 15px;
}
p {
    line-height: 1.5;
}
</style>
</head>

<script>
function showCombo() {
    let value = document.getElementById("comboSelect").value;
    let sections = document.querySelectorAll(".combo-content");

    sections.forEach(section => {
        section.classList.remove("active");
    });

    document.getElementById(value).classList.add("active");
}
</script>
