<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混沌配招展示 - 仗劍傳說</title>

    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #111;
            color: #eee;
        }

        header {
            background: linear-gradient(to bottom, #333, #111);
            color: #4af;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #444;
        }

        /* 篩選選單 */
        .menu {
            text-align: center;
            background: #222;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        select {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 6px;
            background: #333;
            color: white;
            border: 1px solid #555;
            outline: none;
        }

        .menu button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            background: #4af;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu button:hover {
            background: #8ef;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
        }

        /* 網格佈局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }

        /* 職業分類樣式 */
        .box {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            background: #1e1e1e;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .warlock { border-top: 4px solid #59a0b6; }
        .sage { border-top: 4px solid #2ecc71; }
        .fighter { border-top: 4px solid #e74c3c; }
        .knight { border-top: 4px solid #f1c40f; }

        .box h3 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .box img {
            width: 100%;
            height: auto;
            display: block;
            margin: 10px auto;
            border-radius: 6px;
            cursor: zoom-in;
            border: 1px solid #333;
        }

        .source {
            font-size: 13px;
            color: #aaa;
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 4px;
        }

        .source a {
            color: #4af;
            text-decoration: underline;
            font-weight: bold;
        }

        .source a:hover { color: #8ef; }

        .hidden {
            display: none;
        }

        /* 獨立燈箱 (Lightbox) */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            cursor: zoom-out;
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid #4af;
            border-radius: 8px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox.active img {
            transform: scale(1);
        }

        @media(max-width:600px){
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* --- 新增：彩蛋表情樣式 --- */
        #easter-egg-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            z-index: 3000; /* 確保浮在最上層，比 lightbox (2000) 高 */
            transition: transform 0.3s;
        }
        #easter-egg-btn:hover { transform: scale(1.2); }

        /* --- 新增：驚喜彈出視窗 (Modal) 樣式 --- */
        #surprise-modal {
            display: none; /* 預設隱藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8); /* 半透明背景 */
            z-index: 4000; /* 比彩蛋按鈕更高 */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #282828;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            text-align: center;
            position: relative;
            max-width: 400px;
            transform: scale(0.8);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }

        #surprise-modal.active .modal-content {
            transform: scale(1);
            opacity: 1;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 70vh; /* 限制最高高度，確保彈窗不會超出螢幕 */
            object-fit: contain; /* 保持圖片比例，不變形 */
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #4af;
        }

        .modal-content h4 {
            color: #4af;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }

        .modal-content p {
            color: #ccc;
            line-height: 1.6;
        }

        .close-button {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-button:hover { color: #fff; }

        @media(max-width:600px){
            .grid { grid-template-columns: 1fr; }
            .modal-content { max-width: 90%; padding: 15px; }
            .close-button { font-size: 24px; top: 5px; right: 10px; }
        }
    </style>
</head>
<body>

<div class="grid">

<img id="easter-egg-btn" src="pic/feile.png" alt="驚喜表情">

<script>
    console.log("腳本已載入");

    // 統一宣告變數
    const jobSelect = document.getElementById("job");
    const typeSelect = document.getElementById("type");
    const clearBtn = document.getElementById("clear");
    const boxes = document.querySelectorAll(".box");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    const easterEggBtn = document.getElementById("easter-egg-btn");
    const surpriseModal = document.getElementById("surprise-modal");
    const surpriseImg = document.getElementById("surprise-img"); // 確保你的 HTML 裡 img 有這個 id
    const closeModal = surpriseModal.querySelector(".close-button");

    // 1. 篩選功能
    function filter() {
        const job = jobSelect.value, type = typeSelect.value;
        boxes.forEach(box => {
            const m = (job === "all" || box.dataset.job === job) && (type === "all" || box.dataset.type === type);
            box.classList.toggle("hidden", !m);
        });
    }
    jobSelect.onchange = typeSelect.onchange = filter;
    clearBtn.onclick = () => { jobSelect.value = typeSelect.value = "all"; filter(); };

    // 2. 圖片燈箱
    boxes.forEach(box => box.querySelector("img").onclick = () => {
        lightboxImg.src = box.querySelector("img").src;
        lightbox.classList.add("active");
        document.body.style.overflow = "hidden";
    });
    lightbox.onclick = () => { lightbox.classList.remove("active"); document.body.style.overflow = "auto"; };

    // 3. 彩蛋邏輯 (修正了陣列逗號語法)
    const randomImages = [
        "pic/gengtu1.png",
        "pic/gengtu2.png",
        "pic/gengtu3.png",
        "pic/gengtu4.png",
        "pic/gengtu5.png",
        "pic/gengtu6.png",
        "pic/gengtu7.png",
        "pic/gengtu8.png",
        "pic/gengtu9.png",
        "pic/gengtu10.png",
        "pic/gengtu11.png",
        "pic/gengtu12.png"
    ];

    easterEggBtn.onclick = () => {
        const randomIndex = Math.floor(Math.random() * randomImages.length);
        surpriseImg.src = randomImages[randomIndex];
        
        surpriseModal.style.display = "flex";
        setTimeout(() => surpriseModal.classList.add("active"), 10);
        document.body.style.overflow = "hidden";
    };

    closeModal.onclick = () => {
        surpriseModal.classList.remove("active");
        setTimeout(() => surpriseModal.style.display = "none", 300);
        document.body.style.overflow = "auto";
    };
    
    surpriseModal.onclick = (e) => {
        if(e.target === surpriseModal) closeModal.onclick();
    };
</script>
